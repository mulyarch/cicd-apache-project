name: CD Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: cicd-apache-app
  EKS_CLUSTER: cicd-apache-cluster

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest
    outputs:
      ecr_url: ${{ steps.tf-output.outputs.ecr_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.2"

      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve \
            -var-file=environments/prod/terraform.tfvars

      - name: Get Terraform outputs
        id: tf-output
        run: |
          cd terraform
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT

  build-push:
    runs-on: ubuntu-latest
    needs: terraform-deploy
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push production image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s/__VERSION__/${IMAGE_TAG:0:7}/" app/index.html
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:prod-latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:prod-latest

  deploy:
    runs-on: ubuntu-latest
    needs: [terraform-deploy, build-push]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION
          kubectl get nodes

      - name: Deploy with kubectl directly
        env:
          ECR_REPO_URL: ${{ needs.terraform-deploy.outputs.ecr_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Create namespace
          kubectl create namespace apache-app --dry-run=client -o yaml | kubectl apply -f -

          # Create deployment
          cat <<DEPLOY | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: apache-hello
            namespace: apache-app
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: apache-hello
            strategy:
              type: RollingUpdate
              rollingUpdate:
                maxSurge: 1
                maxUnavailable: 0
            template:
              metadata:
                labels:
                  app: apache-hello
                  version: "${IMAGE_TAG}"
              spec:
                containers:
                  - name: apache
                    image: "${ECR_REPO_URL}:${IMAGE_TAG}"
                    ports:
                      - containerPort: 80
                    resources:
                      requests:
                        memory: "64Mi"
                        cpu: "50m"
                      limits:
                        memory: "128Mi"
                        cpu: "100m"
                    livenessProbe:
                      httpGet:
                        path: /
                        port: 80
                      initialDelaySeconds: 10
                      periodSeconds: 10
                    readinessProbe:
                      httpGet:
                        path: /
                        port: 80
                      initialDelaySeconds: 5
                      periodSeconds: 5
          DEPLOY

          # Create service
          cat <<SVC | kubectl apply -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: apache-hello-svc
            namespace: apache-app
            annotations:
              service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
              service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
          spec:
            type: LoadBalancer
            selector:
              app: apache-hello
            ports:
              - protocol: TCP
                port: 80
                targetPort: 80
          SVC

          # Wait for rollout
          kubectl rollout status deployment/apache-hello -n apache-app --timeout=120s
          kubectl get pods -n apache-app

      - name: Run integration tests
        run: |
          chmod +x tests/test_integration.sh
          ./tests/test_integration.sh
