---
- name: Create namespace
  kubernetes.core.k8s:
    state: present
    kind: Namespace
    name: "{{ app_namespace }}"

- name: Deploy application
  kubernetes.core.k8s:
    state: present
    template: deployment.yml.j2

- name: Create service
  kubernetes.core.k8s:
    state: present
    template: service.yml.j2

- name: Wait for deployment rollout
  ansible.builtin.command: >
    kubectl rollout status deployment/{{ app_name }}
    -n {{ app_namespace }} --timeout=120s
  register: rollout_result
  changed_when: false

- name: Get pod status
  ansible.builtin.command: kubectl get pods -n {{ app_namespace }} -o wide
  register: pod_status
  changed_when: false

- name: Display pod status
  ansible.builtin.debug:
    var: pod_status.stdout_lines
